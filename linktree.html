  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #030014;
      color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.1;
      pointer-events: none;
      animation: drift 20s ease-in-out infinite alternate;
    }

    body::before {
      width: 400px;
      height: 400px;
      background: #06b6d4;
      top: -10%;
      left: -5%;
    }

    body::after {
      width: 350px;
      height: 350px;
      background: #a855f7;
      bottom: -10%;
      right: -5%;
      animation-delay: -10s;
      animation-direction: alternate-reverse;
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(25px, -15px) scale(1.05);
      }

      100% {
        transform: translate(-15px, 10px) scale(0.95);
      }
    }

    .linktree {
      width: 100%;
      max-width: 400px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 1.2rem;
      border: 3px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 40px rgba(37, 99, 235, 0.25);
      animation: glow-pulse 4s ease-in-out infinite;
    }

    @keyframes glow-pulse {

      0%,
      100% {
        box-shadow: 0 0 30px rgba(37, 99, 235, 0.2);
      }

      50% {
        box-shadow: 0 0 50px rgba(37, 99, 235, 0.35);
      }
    }

    .name {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
      letter-spacing: -0.5px;
    }

    .bio {
      color: #64748b;
      font-size: 0.82rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1.3rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      color: #e2e8f0;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .link-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
    }

    .icon-portfolio {
      background: rgba(34, 211, 255, 0.1);
      color: #22d3ee;
    }

    .icon-resume {
      background: rgba(245, 158, 11, 0.1);
      color: #fbbf24;
    }

    .icon-github {
      background: rgba(255, 255, 255, 0.06);
      color: #e2e8f0;
    }

    .icon-whatsapp {
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
    }

    .icon-email {
      background: rgba(168, 85, 247, 0.1);
      color: #c084fc;
    }

    .link-label {
      flex: 1;
      text-align: left;
    }

    .link-arrow {
      color: #334155;
      transition: color 0.2s, transform 0.2s;
    }

    .link-btn:hover .link-arrow {
      color: #64748b;
      transform: translateX(2px);
    }

    .footer-text {
      margin-top: 2.5rem;
      color: #1e293b;
      font-size: 0.7rem;
    }
  </style>
</head>
